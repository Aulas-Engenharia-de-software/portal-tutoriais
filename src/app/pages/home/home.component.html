<div class="mb-10 animate-fade-in">
  <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">Portal do Aluno</h2>
  <p class="text-lg text-slate-600">Selecione o laboratório ou tutorial que deseja iniciar.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div [routerLink]="['/tutorial-aws']"
       class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md hover:border-orange-300 transition-all cursor-pointer group relative">

    <div class="bg-orange-50 w-12 h-12 rounded-xl flex items-center justify-center text-orange-600 mb-5 group-hover:scale-110 transition-transform">
      <i class="fab fa-aws text-2xl"></i>
    </div>

    <h3 class="text-xl font-bold text-slate-900 mb-2">Mensageria e EDA na AWS</h3>
    <p class="text-slate-600 text-sm mb-6">Tutorial completo para configuração orientada a eventos.</p>

    <div class="flex items-center text-orange-600 font-medium text-sm">
      Começar tutorial
      <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
    </div>

    <span class="absolute inset-0" aria-hidden="true"></span>
  </div>
</div>
