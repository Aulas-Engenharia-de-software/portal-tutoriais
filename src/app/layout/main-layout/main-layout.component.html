<div class="flex h-screen bg-slate-50 font-sans text-slate-900">

  <app-sidebar
    [class.hidden]="!isMobileMenuOpen"
    class="fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 md:relative md:flex md:flex-col">
  </app-sidebar>

  @if (isMobileMenuOpen) {
    <div (click)="toggleMenu()" class="fixed inset-0 bg-slate-900/50 z-40 md:hidden"></div>
  }

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <app-header></app-header>
    <main class="flex-1 overflow-y-auto p-4 sm:p-4 md:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
