<div class="flex flex-col h-full p-5">
  <div class="flex items-center gap-5 mb-10 px-2">
    <div class="bg-orange-500 text-white p-2 rounded-lg">
      <i class="fas fa-cube text-xl"></i>
    </div>
    <span class="text-xl font-bold tracking-tight text-slate-900">Portal de Aulas</span>
  </div>

  <nav class="flex-1 space-y-1">

    <div class="space-y-1">
      <p class="px-4 text-xs font-semibold text-slate-400 tracking-wider mb-2 uppercase">Principal</p>

      <a routerLink="/dashboard" routerLinkActive="bg-orange-50 text-orange-600 border-orange-200"
         class="flex items-center gap-3 px-3 py-5 rounded-xl text-slate-600 hover:bg-slate-50 transition-all border border-transparent">
        <i class="fas fa-home w-5"></i>
        <span class="font-medium">Dashboard</span>
      </a>

      <p class="px-4 text-xs font-semibold text-slate-400 tracking-wider mb-2 uppercase">Conteúdos</p>

      <div>
        <button
          (click)="toggleTutorialsMenu()"
          [routerLink]="['/tutoriais']"
          class="w-full flex items-center justify-between px-4 py-2.5 text-sm font-medium rounded-lg transition-all duration-200"
          [ngClass]="isTutorialsMenuOpen ? 'bg-orange-50 text-orange-700' : 'text-slate-600 hover:bg-slate-50'">

          <div class="flex items-center gap-3">
            <i class="fas fa-book text-lg" [ngClass]="isTutorialsMenuOpen ? 'text-orange-600' : 'text-slate-400'"></i>
            <span>Tutoriais</span>
          </div>

          <i class="fas fa-chevron-down text-xs transition-transform duration-300"
             [class.rotate-180]="isTutorialsMenuOpen"></i>
        </button>

        <div class="grid transition-all duration-300 ease-in-out" [class.grid-rows-[1fr]]="isTutorialsMenuOpen"
             [class.opacity-100]="isTutorialsMenuOpen" [class.grid-rows-[0fr]]="!isTutorialsMenuOpen"
             [class.opacity-0]="!isTutorialsMenuOpen">

          <div class="overflow-hidden">
            <div class="mt-1 ml-6 pl-4 border-l-2 border-slate-100 space-y-1">

              <a *ngFor="let tut of tutoriaisList | slice:0:4"
                 [routerLink]="tut.route"
                 class="block px-3 py-2 text-sm text-slate-500 hover:text-orange-700 hover:bg-orange-50/50 rounded-md transition-colors truncate"
                 [title]="tut.title"> {{ tut.title }}
              </a>

              <a *ngIf="tutoriaisList.length > 4"
                 routerLink="/tutoriais"
                 class="block px-3 py-2 mt-2 text-xs font-semibold text-orange-600 hover:text-orange-800 transition-colors">
                Ver todos ({{ tutoriaisList.length }}) &rarr;
              </a>

            </div>
          </div>
        </div>
      </div>

      <a routerLink="/laboratorios"
         class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
        <i class="fas fa-flask text-lg text-slate-400"></i>
        <span>Laboratórios</span>
      </a>

      <a routerLink="/materiais"
         class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
        <i class="fas fa-folder-open text-lg text-slate-400"></i>
        <span>Materiais</span>
      </a>

      <a routerLink="/faq"
         class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
        <i class="fas fa-question-circle text-lg text-slate-400"></i>
        <span>FAQ</span>
      </a>
    </div>

  </nav>

  <div class="mt-auto pt-6 border-t border-slate-100">
    <div class="bg-slate-900 rounded-2xl p-4 text-white">
      <p class="text-xs text-slate-400 mb-1 font-medium">Professor</p>
      <p class="text-sm font-bold">{{ nomeProfessor }}</p>
      <a [href]="githubLink" target="_blank" class="text-[10px] text-orange-400 hover:underline mt-2 inline-block">
        {{ githubLabel }}
      </a>
    </div>
  </div>
</div>
