<aside class="hidden xl:block w-50 flex-shrink-0 relative">
  <div class="sticky top-0 p-5 bg-slate-50 rounded-2xl border border-slate-200">
    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">{{ title }}</h4>

    <nav class="flex flex-col gap-1 relative">
      <div class="absolute left-[11px] top-4 bottom-4 w-[2px] bg-slate-200 z-0"></div>

      @for (phase of phases; track phase.id) {
        <button
          (click)="scrollTo(phase.id)"
          class="group relative flex items-center gap-4 py-3 text-left transition-all duration-300 z-10 bg-slate-50">

          <div
            [class]="activePhase === phase.id
              ? 'w-6 h-6 rounded-full bg-white border-4 border-orange-500 shadow-sm flex-shrink-0'
              : 'w-6 h-6 rounded-full bg-slate-200 border-4 border-slate-50 group-hover:bg-slate-300 flex-shrink-0'"
            class="transition-all duration-300">
          </div>

          <span
            [class]="activePhase === phase.id ? 'text-orange-600 font-bold' : 'text-slate-500 font-medium'"
            class="text-sm transition-all duration-300 group-hover:text-slate-900">
            {{ phase.label }}
          </span>
        </button>
      }
    </nav>
  </div>
</aside>
