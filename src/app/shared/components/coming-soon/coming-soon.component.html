<div class="flex flex-col items-center justify-center min-h-[70vh] px-4 text-center animate-fade-in ">

  <div class="text-7xl sm:text-8xl mb-8 animate-bounce">
    🚧
  </div>

  <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">
    Opa! Área em Construção
  </h2>
  <br>

  <div class="bg-orange-50 border border-orange-200 rounded-xl p-6 max-w-lg w-full mb-8 shadow-sm" >

    <p class="text-orange-800 font-mono text-sm sm:text-base leading-relaxed break-words">
      {{ desculpaAtual }} <span class="animate-pulse">_</span>
    </p>
  </div>

  <div class="flex flex-col sm:flex-row gap-4" >
    <button
      (click)="sortearDesculpa()"
      class="px-6 py-3 bg-white border-2 border-slate-200 text-slate-700 font-semibold rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-colors flex items-center justify-center gap-2">
      <i class="fas fa-dice text-orange-500"></i>
      Bahh, conta outra
    </button>

    <a
      routerLink="/"
      class="px-6 py-3 bg-orange-600 text-white font-semibold rounded-lg hover:bg-orange-700 transition-colors shadow-sm hover:shadow-md flex items-center justify-center gap-2">
      <i class="fas fa-home"></i>
      Voltar para um lugar seguro
    </a>
  </div>

</div>
